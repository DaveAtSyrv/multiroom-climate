# Strict typing for the integration (the Platinum strict-typing quality rule).
#
# Starts from mypy's full `strict` preset, then re-enables implicit re-export: Home Assistant's
# public component API (e.g. `from homeassistant.components.climate import HVACMode`) re-exports
# names without an explicit `__all__`, which is the blessed import pattern across core and every
# third-party integration. `strict`'s `no_implicit_reexport` is stricter than HA's own bar and would
# only push us to reach into private submodules, so it's the one strict check we drop. This mirrors
# HA core's own mypy config, which sets no_implicit_reexport=false for `components.*`. The setting is
# global (it also relaxes re-exports between our own modules), but that masks nothing today: every
# name imported across our modules is locally defined, not a re-export chain. Every other strict
# check (untyped defs, Any generics, return-any, strict equality, …) stays on against our modules.
[mypy]
python_version = 3.13
strict = True
implicit_reexport = True
