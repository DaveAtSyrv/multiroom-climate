# Home Assistant Integration Quality Scale progress tracker.
#
# This is an internal checklist (the integration is a custom/HACS component, which HA does not
# formally score). Each rule is `done`, `todo`, or `status: exempt` with a reason. Tiers are
# cumulative: Bronze, then Silver, then Gold, then Platinum.

rules:
  # ---- Bronze ----
  action-setup:
    status: exempt
    comment: The integration registers no service actions.
  appropriate-polling: done  # DataUpdateCoordinator, 60s interval.
  brands:
    status: todo
    comment: Blocked on the public release — needs a PR to home-assistant/brands. The user's call.
  common-modules: done  # coordinator.py / controller.py / const.py.
  config-flow: done
  config-flow-test-coverage: done  # test_config_flow.py; 100% coverage.
  dependency-transparency:
    status: exempt
    comment: No external runtime dependencies (manifest requirements is empty).
  docs-actions:
    status: exempt
    comment: No service actions to document.
  docs-high-level-description: done  # README intro.
  docs-installation-instructions: done  # README "Installation" (HACS + manual).
  docs-removal-instructions: done  # README "Removing the integration".
  entity-event-setup: done  # switch restores in async_added_to_hass; climate is a CoordinatorEntity.
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done  # entry.runtime_data.
  test-before-configure:
    status: exempt
    comment: No external connection to test; the config flow's EntitySelectors only offer existing entities.
  test-before-setup:
    status: exempt
    comment: >-
      Wraps an intra-HA climate entity, not an external I/O service. A temporarily-absent
      thermostat is handled via entity availability rather than deferring setup — matching HA's
      own wrapping helpers (threshold/derivative/min_max/group/integration/utility_meter), none of
      which raise ConfigEntryNotReady for a missing source entity. Raising would force-fail setup
      and contradict the deliberate available-when-thermostat-missing design.
  unique-config-entry: done  # unique_id = wrapped entity; aborts if already configured.

  # ---- Silver ----
  action-exceptions:
    status: exempt
    comment: No service actions.
  config-entry-unloading: done  # async_unload_entry.
  docs-configuration-parameters: done  # README "Day/night schedule (options)" documents all 6 options-flow params (enable, day/night temp, day/night start, optimal-start lead).
  docs-installation-parameters: done  # README "Setup" lists thermostat / sensors / humidity.
  entity-unavailable: done  # climate.available follows thermostat presence.
  integration-owner: done  # manifest codeowners.
  log-when-unavailable: done  # coordinator logs one WARNING when the thermostat / all sensors drop, one INFO on return.
  parallel-updates: done  # PARALLEL_UPDATES = 0 on both platforms.
  reauthentication-flow:
    status: exempt
    comment: Wraps a user-picked climate entity; the integration holds no credentials of its own.
  test-coverage: done  # 100% statement + branch (Silver wants >95%).

  # ---- Gold ----
  devices: done  # virtual SERVICE device groups the entities.
  diagnostics: done  # diagnostics.py.
  discovery:
    status: exempt
    comment: Wraps a user-picked entity; there is nothing to auto-discover.
  discovery-update-info:
    status: exempt
    comment: No discovery transport.
  docs-data-update: done  # README "How it updates" — local polling, 60s coordinator tick, write-when-enabled.
  docs-examples: done  # README "Examples" — presence on/off automation, failsafe-notify automation, set-target script.
  docs-known-limitations: done  # README "Known limitations" — equal-weight avg, one schedule, symmetric lead, bounded humidity, fan provenance, failsafe-no-notify.
  docs-supported-devices: done  # README "Supported devices" — heat/cool-band requirement, tested Daikin Skyport, single-setpoint unsupported.
  docs-supported-functions: done  # README "What it does".
  docs-troubleshooting: done  # README "Troubleshooting" — shadow_* diagnostics, switch-off, no_thermostat_band, waiting_for_first_reading, unavailable, wrong-temp, schedule, fan-blocked.
  docs-use-cases: done  # README "Use cases" — uneven house, automate the offset hack, night setback, humid comfort, destratify.
  dynamic-devices:
    status: exempt
    comment: A single wrapped entity; no dynamic device set.
  entity-category:
    status: done
    comment: >-
      Assessed: no EntityCategory is correct. HA's guidance says don't categorize an entity that's a
      primary feature of the device. The master-enable switch is the on/off for the integration's one
      job (a two-entity integration: the climate entity + this switch) — a primary control, not a
      tuning/diagnostic entity — so it stays uncategorized (the code already sets no category). If a
      later version adds tuning toggles (e.g. v2 per-room weights / gains), *those* become CONFIG and
      this switch remains primary above them.
  entity-device-class:
    status: exempt
    comment: Climate has no device-class concept; the switch's default class is appropriate.
  entity-disabled-by-default:
    status: exempt
    comment: Both entities are primary and useful; none should be disabled by default.
  entity-translations: done  # switch uses translation_key "control"; climate takes the device name.
  exception-translations:
    status: exempt
    comment: >-
      The integration raises no user-facing exceptions (no `raise` in any module). Write failures to
      the wrapped thermostat are deliberately caught and logged/swallowed so a bad write can't break
      the coordinator (it self-corrects next tick); config-flow problems surface via the translated
      `errors`/`abort` strings, not exceptions; and async_set_temperature clamps via the band rather
      than raising. Nothing to translate — there's no exception path to a translation_key.
  icon-translations: done  # switch icon moved from _attr_icon to icons.json (entity.switch.control.default).
  reconfiguration-flow: done  # async_step_reconfigure.
  repair-issues:
    status: done
    comment: >-
      Raises a repair issue when the wrapped thermostat is *absent from the state machine*
      (removed/renamed/never-loaded) for a sustained run of polls (~5 min, to outlast slow
      startup/reload), cleared when it returns or on unload. Deliberately scoped to a truly-missing
      entity: a registered-but-unavailable thermostat is transient and owned by log_when_unavailable
      (the accepted gap is a thermostat that stays registered but permanently dead — logging covers
      that, not a repair). is_fixable=False (informational; the description tells the user to restore
      the entity or reconfigure).
  stale-devices:
    status: exempt
    comment: No remote device set that can go stale.

  # ---- Platinum ----
  async-dependency:
    status: exempt
    comment: No external dependency.
  inject-websession:
    status: exempt
    comment: No external dependency / no HTTP session.
  strict-typing:
    status: todo
    comment: Add a strict mypy config + ship a py.typed marker and make strict mypy pass.
