name: Validate

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 0 * * *"

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements_test.txt
      - run: pytest -q

  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS
    runs-on: ubuntu-latest
    # The HACS action reads repo files over unauthenticated raw.githubusercontent.com URLs, which
    # 404 while the repo is PRIVATE — so it can't validate until we go public (hassfest covers
    # manifest checks meanwhile, reading the workspace). Skip on PRs and while private; this job
    # auto-activates when the repo is flipped public for the HACS/brands submission (SPEC §6/§7).
    if: github.event_name != 'pull_request' && github.event.repository.private == false
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          # 'brands' is validated at publish time (we add brand assets + submit to
          # home-assistant/brands when the repo goes public — see SPEC.md §6/§7).
          ignore: brands
